<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Library — DictationApp</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f5f0e8;--surface:#fdfaf4;--surface2:#f0ead8;--border:#d9d0bc;--text:#1a1612;--text-muted:#7a7060;--accent:#3d6b4f;--accent-light:#e8f2ec;--danger:#c0392b;--success:#2d6a3f;--warning:#c07820;--shadow:0 2px 12px rgba(0,0,0,0.08);--shadow-lg:0 8px 32px rgba(0,0,0,0.12);--radius:10px;--font-serif:'Libre Baskerville',Georgia,serif;--font-sans:'DM Sans',system-ui,sans-serif;}
  [data-theme="dark"]{--bg:#141210;--surface:#1e1b17;--surface2:#28241e;--border:#3a3530;--text:#ede8df;--text-muted:#8a8070;--accent:#5a9e70;--accent-light:#1a2e22;--danger:#e05545;--success:#4da868;--warning:#d4952a;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font-sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

  /* NAV */
  nav.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;height:56px;gap:1.5rem;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
  .logo{font-family:var(--font-serif);font-size:1.1rem;font-weight:700;color:var(--accent);text-decoration:none;display:flex;align-items:center;gap:.5rem;}
  .logo-icon{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.9rem;}
  .nav-links{display:flex;gap:.25rem;margin-left:auto;align-items:center;}
  .nav-links a{font-size:.875rem;font-weight:500;color:var(--text-muted);text-decoration:none;padding:.4rem .75rem;border-radius:6px;transition:all .15s;}
  .nav-links a:hover{color:var(--text);background:var(--surface2);}
  .nav-links a.active{color:var(--accent);background:var(--accent-light);}
  .nav-user{display:flex;align-items:center;gap:.5rem;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;font-weight:500;color:var(--text-muted);}
  .nav-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;}
  .theme-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .15s;margin-left:.5rem;}
  .theme-btn:hover{color:var(--text);border-color:var(--accent);}
  .logout-btn{font-size:.875rem;color:var(--text-muted);background:none;border:none;cursor:pointer;padding:.4rem .75rem;border-radius:6px;font-family:var(--font-sans);}
  .logout-btn:hover{color:var(--danger);}

  /* MAIN */
  main{flex:1;padding:2rem 1.5rem;}
  .container{max-width:1100px;margin:0 auto;}

  /* PAGE HEADER */
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;}
  .page-title{font-family:var(--font-serif);font-size:1.75rem;font-weight:700;}
  .btn-add{display:flex;align-items:center;gap:.5rem;padding:.6rem 1.25rem;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:var(--font-sans);font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s;}
  .btn-add:hover{opacity:.88;}

  /* FILTERS */
  .filters{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem;align-items:center;}
  .filter-tabs{display:flex;gap:.25rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px;}
  .filter-tab{padding:.35rem .875rem;border:none;border-radius:6px;background:none;color:var(--text-muted);font-family:var(--font-sans);font-size:.875rem;font-weight:500;cursor:pointer;transition:all .15s;}
  .filter-tab.active{background:var(--accent);color:#fff;}
  .search-wrap{margin-left:auto;}
  .search-input{padding:.45rem .875rem;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:var(--font-sans);font-size:.875rem;width:240px;transition:border-color .15s;}
  .search-input:focus{outline:none;border-color:var(--accent);}

  /* GRID */
  .exercises-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem;}
  .empty-state{grid-column:1/-1;text-align:center;padding:4rem 2rem;color:var(--text-muted);}
  .empty-icon{font-size:3rem;margin-bottom:1rem;}
  .empty-title{font-family:var(--font-serif);font-size:1.25rem;color:var(--text);margin-bottom:.5rem;}

  /* EXERCISE CARD */
  .ex-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:box-shadow .2s,transform .2s;cursor:pointer;}
  .ex-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);}
  .ex-thumb{position:relative;width:100%;aspect-ratio:16/9;background:var(--surface2);overflow:hidden;}
  .ex-thumb img{width:100%;height:100%;object-fit:cover;}
  .ex-thumb-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;background:var(--surface2);}
  .status-badge{position:absolute;top:.5rem;right:.5rem;padding:.25rem .6rem;border-radius:20px;font-size:.75rem;font-weight:600;}
  .badge-not-started{background:rgba(0,0,0,.55);color:#fff;}
  .badge-in-progress{background:#c07820;color:#fff;}
  .badge-completed{background:#2d6a3f;color:#fff;}
  .badge-processing{background:#555;color:#fff;}
  .badge-failed{background:var(--danger);color:#fff;}
  .ex-body{padding:1rem;}
  .ex-title{font-weight:600;font-size:.95rem;line-height:1.4;margin-bottom:.25rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .ex-channel{font-size:.8rem;color:var(--text-muted);margin-bottom:.75rem;}
  .progress-bar-wrap{height:5px;background:var(--surface2);border-radius:3px;margin-bottom:.5rem;overflow:hidden;}
  .progress-bar-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s;}
  .ex-meta{display:flex;justify-content:space-between;font-size:.8rem;color:var(--text-muted);margin-bottom:.875rem;}
  .ex-actions{display:flex;gap:.5rem;}
  .btn-sm{padding:.45rem .875rem;border-radius:6px;font-family:var(--font-sans);font-size:.8rem;font-weight:600;cursor:pointer;border:none;transition:all .15s;}
  .btn-primary-sm{background:var(--accent);color:#fff;}
  .btn-primary-sm:hover{opacity:.88;}
  .btn-ghost-sm{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);}
  .btn-ghost-sm:hover{color:var(--text);}
  .btn-danger-sm{background:none;border:1px solid var(--border);color:var(--danger);}
  .btn-danger-sm:hover{background:#fde8e8;}
  .processing-state{padding:.5rem 0;font-size:.85rem;color:var(--text-muted);display:flex;align-items:center;gap:.5rem;}
  .spinner-sm{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;}

  /* ADD VIDEO MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:480px;box-shadow:var(--shadow-lg);}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);}
  .modal-title{font-family:var(--font-serif);font-size:1.15rem;font-weight:700;}
  .modal-close{background:none;border:none;font-size:1.25rem;color:var(--text-muted);cursor:pointer;line-height:1;padding:.25rem;}
  .modal-body{padding:1.5rem;}
  .modal-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:.75rem;}
  .form-group{margin-bottom:1.25rem;}
  .form-label{display:block;font-size:.875rem;font-weight:500;margin-bottom:.4rem;}
  .form-input{width:100%;padding:.65rem .875rem;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);font-family:var(--font-sans);font-size:.95rem;transition:border-color .15s;}
  .form-input:focus{outline:none;border-color:var(--accent);}
  .form-hint{font-size:.8rem;color:var(--text-muted);margin-top:.35rem;}
  .form-select{width:100%;padding:.65rem .875rem;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);font-family:var(--font-sans);font-size:.875rem;}
  .modal-error{color:var(--danger);font-size:.875rem;margin-bottom:1rem;display:none;}
  .btn-cancel{padding:.6rem 1.25rem;border:1px solid var(--border);border-radius:7px;background:none;color:var(--text-muted);font-family:var(--font-sans);font-size:.9rem;cursor:pointer;}
  .btn-submit{padding:.6rem 1.5rem;border:none;border-radius:7px;background:var(--accent);color:#fff;font-family:var(--font-sans);font-size:.9rem;font-weight:600;cursor:pointer;}
  .btn-submit:disabled{opacity:.55;cursor:not-allowed;}

  /* PROCESSING TOAST */
  .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;box-shadow:var(--shadow-lg);z-index:300;min-width:280px;display:none;}
  .toast.show{display:block;}
  .toast-title{font-weight:600;font-size:.9rem;margin-bottom:.25rem;}
  .toast-body{font-size:.82rem;color:var(--text-muted);}

  /* LOADING SKELETON */
  .skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;}
  @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
  .skel-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .skel-thumb{aspect-ratio:16/9;width:100%;}
  .skel-body{padding:1rem;}
  .skel-line{height:14px;border-radius:4px;margin-bottom:.6rem;}

  @keyframes spin{to{transform:rotate(360deg);}}

  @media(max-width:600px){
    .page-header{flex-direction:column;align-items:flex-start;}
    .filters{flex-direction:column;}
    .search-wrap{width:100%;margin-left:0;}
    .search-input{width:100%;}
  }
</style>
</head>
<body>

<nav class="topbar">
  <a href="index.html" class="logo">
    <div class="logo-icon">🎧</div>
    DictationApp
  </a>
  <div class="nav-links">
    <a href="index.html" class="active">📚 Library</a>
    <a href="progress.html">📊 Progress</a>
    <span class="nav-user">
      <div class="nav-avatar" id="navAvatar">?</div>
      <span id="navName">…</span>
    </span>
    <button class="logout-btn" id="logoutBtn">Sign out</button>
    <button class="theme-btn" id="themeBtn" title="Toggle theme">🌙</button>
  </div>
</nav>

<main>
  <div class="container">
    <div class="page-header">
      <h1 class="page-title">My Library</h1>
      <button class="btn-add" id="addVideoBtn">＋ Add Video</button>
    </div>

    <div class="filters">
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="not_started">Not started</button>
        <button class="filter-tab" data-filter="in_progress">In progress</button>
        <button class="filter-tab" data-filter="completed">Completed</button>
      </div>
      <div class="search-wrap">
        <input type="text" class="search-input" id="searchInput" placeholder="🔍  Search exercises…">
      </div>
    </div>

    <div class="exercises-grid" id="exercisesGrid">
      <!-- Skeleton loading placeholders (replaced by JS after load) -->
      <div class="skel-card"><div class="skel-thumb skeleton"></div><div class="skel-body"><div class="skel-line skeleton" style="width:80%"></div><div class="skel-line skeleton" style="width:50%"></div><div class="skel-line skeleton" style="width:60%;height:8px;margin-top:.5rem"></div></div></div>
      <div class="skel-card"><div class="skel-thumb skeleton"></div><div class="skel-body"><div class="skel-line skeleton" style="width:70%"></div><div class="skel-line skeleton" style="width:45%"></div><div class="skel-line skeleton" style="width:55%;height:8px;margin-top:.5rem"></div></div></div>
      <div class="skel-card"><div class="skel-thumb skeleton"></div><div class="skel-body"><div class="skel-line skeleton" style="width:85%"></div><div class="skel-line skeleton" style="width:55%"></div><div class="skel-line skeleton" style="width:65%;height:8px;margin-top:.5rem"></div></div></div>
      <div class="skel-card"><div class="skel-thumb skeleton"></div><div class="skel-body"><div class="skel-line skeleton" style="width:75%"></div><div class="skel-line skeleton" style="width:40%"></div><div class="skel-line skeleton" style="width:50%;height:8px;margin-top:.5rem"></div></div></div>
      <div class="skel-card"><div class="skel-thumb skeleton"></div><div class="skel-body"><div class="skel-line skeleton" style="width:80%"></div><div class="skel-line skeleton" style="width:50%"></div><div class="skel-line skeleton" style="width:60%;height:8px;margin-top:.5rem"></div></div></div>
      <div class="skel-card"><div class="skel-thumb skeleton"></div><div class="skel-body"><div class="skel-line skeleton" style="width:65%"></div><div class="skel-line skeleton" style="width:45%"></div><div class="skel-line skeleton" style="width:55%;height:8px;margin-top:.5rem"></div></div></div>
    </div>
  </div>
</main>

<!-- ADD VIDEO MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add YouTube Exercise</div>
      <button class="modal-close" id="closeModal">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-error" id="modalError"></div>
      <div class="form-group">
        <label class="form-label">YouTube URL or Video ID</label>
        <input class="form-input" type="text" id="youtubeUrl"
          placeholder="https://youtube.com/watch?v=… or BTjxUS_PylA">
        <div class="form-hint">The transcript will be fetched automatically from YouTube captions.</div>
      </div>
      <div class="form-group">
        <label class="form-label">Difficulty</label>
        <select class="form-select" id="difficulty">
          <option value="beginner">Beginner</option>
          <option value="intermediate" selected>Intermediate</option>
          <option value="advanced">Advanced</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Language</label>
        <input class="form-input" type="text" id="language" value="en" placeholder="en, fr, es, …">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="cancelModal">Cancel</button>
      <button class="btn-submit" id="submitModal">Add Exercise</button>
    </div>
  </div>
</div>

<!-- PROCESSING TOAST -->
<div class="toast" id="processingToast">
  <div class="toast-title">⏳ Processing transcript…</div>
  <div class="toast-body" id="toastBody">Fetching captions from YouTube</div>
</div>

<script type="module">
import { auth, exercises, progress } from './js/api.js';

// ── Auth guard ────────────────────────────────────────────────
let currentUser = null;
async function init() {
  currentUser = await auth.restoreSession();
  if (!currentUser) {
    window.location.href = 'login.html';
    return;
  }
  document.getElementById('navName').textContent = currentUser.displayName;
  document.getElementById('navAvatar').textContent = currentUser.displayName[0].toUpperCase();
  loadExercises();
}

// ── Theme ─────────────────────────────────────────────────────
let dark = localStorage.getItem('dd-theme') === 'dark' ||
  (!localStorage.getItem('dd-theme') && matchMedia('(prefers-color-scheme:dark)').matches);
function applyTheme() {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  document.getElementById('themeBtn').textContent = dark ? '☀️' : '🌙';
}
applyTheme();
document.getElementById('themeBtn').addEventListener('click', () => {
  dark = !dark;
  localStorage.setItem('dd-theme', dark ? 'dark' : 'light');
  applyTheme();
});

// ── Logout ────────────────────────────────────────────────────
document.getElementById('logoutBtn').addEventListener('click', async () => {
  await auth.logout();
  window.location.href = 'login.html';
});

// ── State ─────────────────────────────────────────────────────
let allExercises = [];
let activeFilter = 'all';
let searchQuery = '';

// ── Load exercises ────────────────────────────────────────────
async function loadExercises() {
  try {
    const data = await exercises.list();
    allExercises = data.exercises;
    renderGrid();
  } catch (err) {
    document.getElementById('exercisesGrid').innerHTML =
      `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Failed to load exercises</div><p>${err.message}</p></div>`;
  }
}

// ── Render grid ───────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('exercisesGrid');
  let list = allExercises;

  if (activeFilter !== 'all') {
    list = list.filter(ex => ex.progress?.status === activeFilter);
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(ex =>
      ex.title.toLowerCase().includes(q) || ex.channelName?.toLowerCase().includes(q)
    );
  }

  if (list.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🎧</div>
        <div class="empty-title">${activeFilter === 'all' && !searchQuery ? 'No exercises yet' : 'Nothing matches'}</div>
        <p>${activeFilter === 'all' && !searchQuery ? 'Add your first YouTube video to get started.' : 'Try a different filter or search.'}</p>
      </div>`;
    return;
  }

  grid.innerHTML = list.map(ex => buildCard(ex)).join('');

  // Bind card actions
  grid.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.id;
      const action = btn.dataset.action;
      if (action === 'open') openExercise(id);
      if (action === 'delete') deleteExercise(id, btn);
      if (action === 'retry') retryTranscript(id);
      if (action === 'reset') resetExercise(id);
    });
  });

  // Whole-card click opens exercise
  grid.querySelectorAll('.ex-card[data-id]').forEach(card => {
    card.addEventListener('click', () => {
      const ex = allExercises.find(e => String(e._id) === card.dataset.id);
      if (ex && ex.transcriptStatus === 'ready') openExercise(card.dataset.id);
    });
  });
}

function buildCard(ex) {
  const prog = ex.progress || { status: 'not_started', passedCount: 0, totalChallenges: 0, currentChallengeIndex: 0 };
  const total = prog.totalChallenges || 0;
  const passed = prog.passedCount || 0;
  const pct = total > 0 ? Math.round((passed / total) * 100) : 0;
  const isReady = ex.transcriptStatus === 'ready';
  const isProcessing = ex.transcriptStatus === 'processing' || ex.transcriptStatus === 'pending';
  const isFailed = ex.transcriptStatus === 'failed';

  const statusBadge = {
    not_started: '<span class="status-badge badge-not-started">Not started</span>',
    in_progress: '<span class="status-badge badge-in-progress">In progress</span>',
    completed: '<span class="status-badge badge-completed">✓ Completed</span>',
  }[prog.status] || '';

  const transcriptBadge = isProcessing
    ? '<span class="status-badge badge-processing">⏳ Processing</span>'
    : isFailed
    ? '<span class="status-badge badge-failed">⚠ Failed</span>'
    : '';

  const actionBtn = !isReady
    ? (isFailed
        ? `<button class="btn-sm btn-ghost-sm" data-action="retry" data-id="${ex._id}">🔄 Retry</button>`
        : `<span class="processing-state"><span class="spinner-sm"></span> Processing…</span>`)
    : prog.status === 'completed'
    ? `<button class="btn-sm btn-ghost-sm" data-action="open" data-id="${ex._id}">↩ Redo</button>`
    : prog.status === 'in_progress'
    ? `<button class="btn-sm btn-primary-sm" data-action="open" data-id="${ex._id}">▶ Continue</button>`
    : `<button class="btn-sm btn-primary-sm" data-action="open" data-id="${ex._id}">▶ Start</button>`;

  const thumb = ex.thumbnailUrl
    ? `<img src="${ex.thumbnailUrl}" alt="${escHtml(ex.title)}" loading="lazy">`
    : `<div class="ex-thumb-placeholder">🎬</div>`;

  return `
    <div class="ex-card" data-id="${ex._id}">
      <div class="ex-thumb">
        ${thumb}
        ${transcriptBadge || statusBadge}
      </div>
      <div class="ex-body">
        <div class="ex-title">${escHtml(ex.title || 'Untitled Exercise')}</div>
        <div class="ex-channel">${escHtml(ex.channelName || '')} ${ex.difficulty ? '· ' + ex.difficulty : ''}</div>
        ${isReady ? `
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" style="width:${pct}%"></div>
          </div>
          <div class="ex-meta">
            <span>${passed} / ${total} challenges</span>
            <span>${pct}%</span>
          </div>` : ''}
        <div class="ex-actions">
          ${actionBtn}
          ${prog.status === 'completed' || prog.status === 'in_progress'
            ? `<button class="btn-sm btn-ghost-sm" data-action="reset" data-id="${ex._id}" title="Reset progress">↺</button>`
            : ''}
          <button class="btn-sm btn-danger-sm" style="margin-left:auto" data-action="delete" data-id="${ex._id}" title="Delete">🗑</button>
        </div>
      </div>
    </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Actions ───────────────────────────────────────────────────
function openExercise(id) {
  window.location.href = `exercise.html?id=${id}`;
}

async function deleteExercise(id, btn) {
  if (!confirm('Delete this exercise? All progress will be lost.')) return;
  btn.textContent = '…';
  try {
    await exercises.delete(id);
    allExercises = allExercises.filter(e => String(e._id) !== id);
    renderGrid();
  } catch (err) {
    alert(err.message);
    btn.textContent = '🗑';
  }
}

async function retryTranscript(id) {
  try {
    await exercises.retryTranscript(id);
    const ex = allExercises.find(e => String(e._id) === id);
    if (ex) ex.transcriptStatus = 'pending';
    renderGrid();
    startPolling(id);
  } catch (err) {
    alert(err.message);
  }
}

async function resetExercise(id) {
  if (!confirm('Reset all progress for this exercise?')) return;
  try {
    await progress.reset(id);
    const ex = allExercises.find(e => String(e._id) === id);
    if (ex) ex.progress = { status: 'not_started', passedCount: 0, totalChallenges: ex.progress?.totalChallenges || 0, currentChallengeIndex: 0 };
    renderGrid();
  } catch (err) {
    alert(err.message);
  }
}

// ── Filter / search ───────────────────────────────────────────
document.querySelectorAll('.filter-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderGrid();
  });
});

let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = e.target.value.trim();
    renderGrid();
  }, 250);
});

// ── Add Video Modal ───────────────────────────────────────────
const addModal = document.getElementById('addModal');
const modalError = document.getElementById('modalError');

document.getElementById('addVideoBtn').addEventListener('click', () => {
  addModal.classList.add('open');
  document.getElementById('youtubeUrl').focus();
});

function closeModal() {
  addModal.classList.remove('open');
  modalError.style.display = 'none';
  document.getElementById('youtubeUrl').value = '';
}

document.getElementById('closeModal').addEventListener('click', closeModal);
document.getElementById('cancelModal').addEventListener('click', closeModal);
addModal.addEventListener('click', e => { if (e.target === addModal) closeModal(); });

document.getElementById('submitModal').addEventListener('click', async () => {
  const url = document.getElementById('youtubeUrl').value.trim();
  const difficulty = document.getElementById('difficulty').value;
  const language = document.getElementById('language').value.trim() || 'en';

  if (!url) {
    modalError.textContent = 'Please enter a YouTube URL or video ID.';
    modalError.style.display = 'block';
    return;
  }

  const btn = document.getElementById('submitModal');
  btn.disabled = true;
  btn.textContent = 'Adding…';
  modalError.style.display = 'none';

  try {
    const data = await exercises.create(url, { difficulty, language });
    closeModal();
    // Add to list optimistically
    allExercises.unshift({
      ...data.exercise,
      progress: { status: 'not_started', passedCount: 0, totalChallenges: 0 },
    });
    renderGrid();
    // Start polling for transcript status
    startPolling(data.exercise._id);
    showToast('⏳ Processing transcript…', 'Fetching captions from YouTube. This may take a moment.');
  } catch (err) {
    modalError.textContent = err.message;
    modalError.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Add Exercise';
  }
});

// ── Transcript polling ────────────────────────────────────────
const pollingTimers = {};

function startPolling(exerciseId) {
  if (pollingTimers[exerciseId]) return;
  pollingTimers[exerciseId] = setInterval(async () => {
    try {
      const s = await exercises.getStatus(exerciseId);
      const ex = allExercises.find(e => String(e._id) === exerciseId);
      if (ex) {
        ex.transcriptStatus = s.status;
        if (s.title) ex.title = s.title;
        if (s.thumbnailUrl) ex.thumbnailUrl = s.thumbnailUrl;
        if (s.status === 'ready') {
          ex.progress = ex.progress || {};
          ex.progress.totalChallenges = s.challengeCount;
        }
        renderGrid();
      }
      if (s.status === 'ready' || s.status === 'failed') {
        clearInterval(pollingTimers[exerciseId]);
        delete pollingTimers[exerciseId];
        hideToast();
        if (s.status === 'ready') {
          showToast('✓ Transcript ready!', `${s.title || 'Exercise'} — ${s.challengeCount} challenges`);
          setTimeout(hideToast, 3000);
        }
      }
    } catch { /* ignore */ }
  }, 2000);
}

// Poll any currently-processing exercises on page load
function pollPending() {
  allExercises
    .filter(ex => ex.transcriptStatus === 'processing' || ex.transcriptStatus === 'pending')
    .forEach(ex => startPolling(ex._id));
}

// ── Toast ─────────────────────────────────────────────────────
function showToast(title, body) {
  document.querySelector('#processingToast .toast-title').textContent = title;
  document.getElementById('toastBody').textContent = body;
  document.getElementById('processingToast').classList.add('show');
}
function hideToast() {
  document.getElementById('processingToast').classList.remove('show');
}

// ── Boot ──────────────────────────────────────────────────────
init().then(() => pollPending());
</script>
</body>
</html>
