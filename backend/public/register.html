<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — DictationApp</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f5f0e8;--surface:#fdfaf4;--border:#d9d0bc;--text:#1a1612;--text-muted:#7a7060;--accent:#3d6b4f;--danger:#c0392b;--shadow:0 2px 12px rgba(0,0,0,0.08);--radius:10px;--font-serif:'Libre Baskerville',Georgia,serif;--font-sans:'DM Sans',system-ui,sans-serif;}
  [data-theme="dark"]{--bg:#141210;--surface:#1e1b17;--border:#3a3530;--text:#ede8df;--text-muted:#8a8070;--accent:#5a9e70;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font-sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
  nav.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;height:56px;box-shadow:var(--shadow);}
  .logo{font-family:var(--font-serif);font-size:1.1rem;font-weight:700;color:var(--accent);text-decoration:none;display:flex;align-items:center;gap:.5rem;}
  .logo-icon{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.9rem;}
  main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}
  .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem;width:100%;max-width:420px;box-shadow:var(--shadow);}
  .auth-title{font-family:var(--font-serif);font-size:1.5rem;font-weight:700;margin-bottom:.25rem;}
  .auth-sub{color:var(--text-muted);font-size:.9rem;margin-bottom:2rem;}
  .form-group{margin-bottom:1.25rem;}
  label{display:block;font-size:.875rem;font-weight:500;margin-bottom:.4rem;}
  input{width:100%;padding:.65rem .875rem;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);font-family:var(--font-sans);font-size:.95rem;transition:border-color .15s;}
  input:focus{outline:none;border-color:var(--accent);}
  .btn{width:100%;padding:.75rem;border:none;border-radius:7px;font-family:var(--font-sans);font-size:.95rem;font-weight:600;cursor:pointer;transition:all .15s;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:hover{opacity:.9;}
  .btn-primary:disabled{opacity:.55;cursor:not-allowed;}
  .error-msg{background:#fde8e8;border:1px solid var(--danger);color:var(--danger);padding:.6rem .875rem;border-radius:7px;font-size:.875rem;margin-bottom:1.25rem;display:none;}
  .auth-footer{text-align:center;margin-top:1.5rem;font-size:.875rem;color:var(--text-muted);}
  .auth-footer a{color:var(--accent);text-decoration:none;font-weight:500;}
  .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<nav class="topbar">
  <a href="index.html" class="logo">
    <div class="logo-icon">🎧</div>
    DictationApp
  </a>
</nav>
<main>
  <div class="auth-card">
    <div class="auth-title">Create your account</div>
    <div class="auth-sub">Start improving your listening skills today</div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="form-group">
      <label for="displayName">Your name</label>
      <input type="text" id="displayName" placeholder="e.g. Alex" autocomplete="name">
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Password <span style="color:var(--text-muted);font-weight:400">(min 6 chars)</span></label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
    </div>

    <button class="btn btn-primary" id="registerBtn">Create Account</button>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</main>

<script type="module">
import { auth } from './js/api.js';

auth.restoreSession().then(user => {
  if (user) window.location.href = 'index.html';
});

const nameEl = document.getElementById('displayName');
const emailEl = document.getElementById('email');
const passEl = document.getElementById('password');
const btn = document.getElementById('registerBtn');
const errEl = document.getElementById('errorMsg');

function showError(msg) {
  errEl.textContent = msg;
  errEl.style.display = 'block';
}

async function doRegister() {
  const displayName = nameEl.value.trim();
  const email = emailEl.value.trim();
  const password = passEl.value;

  if (!displayName || !email || !password) return showError('Please fill in all fields.');
  if (password.length < 6) return showError('Password must be at least 6 characters.');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Creating account…';
  errEl.style.display = 'none';

  try {
    await auth.register({ email, password, displayName });
    window.location.href = 'index.html';
  } catch (err) {
    showError(err.message);
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
}

btn.addEventListener('click', doRegister);
[nameEl, emailEl, passEl].forEach(el => el.addEventListener('keydown', e => {
  if (e.key === 'Enter') doRegister();
}));
</script>
</body>
</html>
